plugins { id "com.android.application" }

android {
    namespace "com.miaojizhang.app"
    compileSdk 35

    defaultConfig {
        applicationId "com.miaojizhang.app"
        minSdk 23
        targetSdk 35
        versionCode 17
        versionName "6.10.6"
    }

    signingConfigs {
        stable {
            storeFile file("../miaojizhang-stable-signing.jks")
            storePassword "miaojizhang2026"
            keyAlias "miaojizhang"
            keyPassword "miaojizhang2026"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.stable
        }
        release {
            signingConfig signingConfigs.stable
            minifyEnabled false
        }
    }

}

dependencies {
    implementation "androidx.core:core:1.13.1"
}
